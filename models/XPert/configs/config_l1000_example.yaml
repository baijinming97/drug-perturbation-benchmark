model:
  ATTN:
    n_heads: 8
    attention_probs_dropout_prob: 0.1
    hidden_dropout_prob: 0.1  
    cell_input_hidden_dropout_prob: 0.1
    drug_input_hidden_dropout_prob: 0.1
    topk_cell: 128
    topk_drug: 32
    sparse_flag: False
    hidden_size: 256
    trt_structure: CA+SA+SA+CA
    ctl_structure: SA+SA+SA+SA
    ppi_gene_vector_path: data/XPert/processed_data/PPI_gene_vector_128d.npy
  HG:
    node_input_dim: 512
    conv_layers: 2
    hg_path: reference/XPert/HG_data/
    drug_hg_pretrained_embed_path: reference/XPert/HG_data/saved_embedding/HG_drug_embeddings.npy


dataset:
  n_bins: 128
  gene_num: 978
  atom_num: 24
  max_atom_size: 122
  max_value: 15.002
  min_value: 0.0

  l1000:
    num_pert_dose: 10
    num_pert_time: 3
    num_cell_id: 240
    num_tissue_id: 21
  panacea:
    num_pert_dose: 10
    num_pert_time: 3  
    num_cell_id: 240
    num_tissue_id: 21
  cdsdb:
    num_pert_dose: 11
    num_pert_time: 8
    num_cell_id: 14
    num_tissue_id: 14

  # If drug unimol path is not provided, unimol features will be generated from scratch
  drug_unimol_path: null



train:
  train_lr: 0.002
  weight_decay: 0.00001
  batch_size: 2
  num_epochs: 10
  init_epoch: 0
  loss_weight: [0.2, 0.003, 0.2, 1]
  patience: 50
  bandwidth: 0.3

finetune:
  finetune_params: all
  exclude_keys: []
  init_epoch: 0
  finetune_lr: 0.001  # 0.001 for code_dose_time scenario, 0.002 for indenpendent datasets
  weight_decay: 0.00001
